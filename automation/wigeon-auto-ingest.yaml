version: "1.0"
title: "WIGEON Auto-Ingest from Google Drive"
description: |
  Automated workflow to pull report files from Google Drive
  (populated by the WigeonCollector Apps Script) and ingest
  them into the WIGEON database.

  Prerequisites:
  1. WigeonCollector.gs deployed in Google Apps Script
  2. WIGEON_Reports folder exists in Google Drive
  3. googledrive extension enabled in Goose
  4. WIGEON config.json has providers configured

extensions:
  - googledrive
  - developer

instructions: |
  ## WIGEON Auto-Ingest Workflow

  This recipe downloads new report files from Google Drive and
  ingests them into the WIGEON SQLite database.

  ### Step 1: Load Config

  Read the WIGEON config to get the Google Drive folder ID and
  provider list:

  ```bash
  cd ~/Desktop/WIGEON
  cat config.json
  ```

  If `google_drive_folder_id` is empty, search for the folder:
  ```
  googledrive__search(drive_type="file", query="WIGEON_Reports",
    mime_type="application/vnd.google-apps.folder")
  ```

  ### Step 2: List New Files

  ```
  googledrive__search(drive_type="file", parent="<FOLDER_ID>", page_size=50)
  ```

  ### Step 3: Download to Inbox

  For each Excel/CSV/XML/ZIP file:
  ```
  googledrive__download(id_or_url="<FILE_ID>",
    output_path="~/Desktop/WIGEON/inbox/")
  ```

  ### Step 4: Ingest All Files

  ```bash
  cd ~/Desktop/WIGEON
  python3 wigeon.py refresh
  ```

  This will automatically match files to configured providers
  and ingest all data into the database.

  ### Step 5: Export Dashboard Data

  ```bash
  python3 wigeon.py dashboard --export-json
  ```

  ### Step 6: Verify

  ```bash
  python3 wigeon.py stats
  ```

  ### Success Criteria:
  - All new files downloaded from Google Drive
  - All files ingested into WIGEON database
  - Dashboard JSON updated
  - Stats show increased report/row counts
